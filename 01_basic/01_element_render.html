<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <title>Document</title>
  </head>
  <body>
    <div id="root1"></div>
    <script type="text/babel" data-presets="typescript,react">
        /**@type {any} */
        globalWindow = window;
        const { React, ReactDOM } = globalWindow;
        const h1Element = React.createElement(
          'h1', // 태그이름
          {
            id: 'title',
            className: 'title',
          },
          'Hello World' //태그 테스트
        )

        //ReactDOM으로 Element 그리기
        /** @type {HTMLElement} */
        const root1 = document.getElementById('root1');
        ReactDOM.createRoot(root1).render(h1Element);

    </script>

    <div id="root2"></div>
    <script type="text/babel" data-presets="typescript,react">
      // setInterval 이용한 초시계
      // new Date().toLocaleTimeString()를 1초 마다 호출하기

      /** @type {HTMLElement} */
      const root2Element = document.getElementById('root2');
      const root2 = ReactDOM.createRoot(root2Element);

      const textElement = React.createElement(
          'h1', // 태그이름
          {
            className: 'time-label',
          },
          '초시계' //태그 테스트
        )

      setInterval(() => {
        // 현재 시간을 초 단위로 보려주는 Element 그리기
        const timeElement = React.createElement(
          'h1',
          {
            className: 'time',
          },
          new Date().toLocaleTimeString()
        );
        root2.render([textElement, timeElement]);

      }, 1000);
    </script>

    
  </body>
</html>
